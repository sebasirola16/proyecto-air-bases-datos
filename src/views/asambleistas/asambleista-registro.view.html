<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Asambleísta - Sistema AIR</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        .navbar { background: #1a3a5c; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
        .navbar strong { font-size: 16px; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .navbar a:hover { text-decoration: underline; }
        .container { max-width: 700px; margin: 30px auto; padding: 0 20px; }
        h1, h2 { color: #1a3a5c; }
        .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; border: 1px solid #ddd; }
        label { font-weight: bold; color: #333; display: block; margin-top: 12px; }
        input, select { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; margin-top: 4px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; margin-top: 16px; margin-right: 8px; }
        .btn-primary { background: #1a3a5c; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .notif { padding: 10px 16px; border-radius: 6px; margin: 10px 0; display: none; font-weight: bold; }
        .notif-ok { background: #d4edda; color: #155724; display: block; }
        .notif-err { background: #f8d7da; color: #721c24; display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th { background: #1a3a5c; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-activo { background: #d4edda; color: #155724; }
        .badge-inactivo { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="navbar">
    <strong>🏛️ Sistema AIR</strong>
    <a href="/shared/login.view.html">Inicio</a>
    <a href="/asambleistas/asambleista-lista.view.html">← Volver al listado</a>
    <a href="/normativa/reglamento-arbol.view.html">Normativa</a>
</div>

<div class="container">
    <h1 id="titulo-pagina">➕ Nuevo Asambleísta</h1>

    <div class="card">
        <h2>Datos Personales</h2>
        <div id="notif-datos" class="notif"></div>

        <label for="cedula">Cédula *</label>
        <input type="text" id="cedula" placeholder="Ej: 1-2345-6789" />

        <label for="nombre">Nombre Completo *</label>
        <input type="text" id="nombre" placeholder="Nombre completo" />

        <label for="correo">Correo Institucional</label>
        <input type="email" id="correo" placeholder="ejemplo@itcr.ac.cr" />

        <div>
            <button class="btn-primary" onclick="guardarAsambleista()">Guardar</button>
            <button class="btn-secondary" onclick="window.location.href='/asambleistas/asambleista-lista.view.html'">Cancelar</button>
        </div>
    </div>

    <div class="card" id="seccion-nombramientos">
        <h2>Historial de Nombramientos</h2>
        <div id="notif-nom" class="notif"></div>

        <label for="selectSector">Sector</label>
        <select id="selectSector">
            <option value="">-- Seleccione --</option>
        </select>

        <label for="fechaInicio">Fecha Inicio</label>
        <input type="date" id="fechaInicio" />

        <button class="btn-success" onclick="agregarNombramiento()">+ Agregar Nombramiento</button>

        <table style="margin-top:16px">
            <thead>
                <tr>
                    <th>Sector</th>
                    <th>Puesto</th>
                    <th>Fecha Inicio</th>
                    <th>Fecha Fin</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-nombramientos">
                <tr><td colspan="5" style="text-align:center;color:#999">Sin nombramientos</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const TOKEN = localStorage.getItem('token') || '';
    let asambleistaId = null;

    const params = new URLSearchParams(window.location.search);
    const cedulaParam = params.get('cedula');

    async function cargarSectores() {
        try {
            const res = await fetch('/api/sectores', {
                headers: { 'Authorization': 'Bearer ' + TOKEN }
            });
            const data = await res.json();
            const select = document.getElementById('selectSector');
            data.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id_sector;
                opt.textContent = s.nombre;
                select.appendChild(opt);
            });
        } catch (err) {
            console.error('Error cargando sectores:', err);
        }
    }

    async function cargarAsambleista(cedula) {
        try {
            const res = await fetch(`/api/asambleistas/${cedula}`, {
                headers: { 'Authorization': 'Bearer ' + TOKEN }
            });
            const data = await res.json();
            const a = Array.isArray(data) ? data[0] : data;
            if (!a) return;

            asambleistaId = a.asambleista_id;
            document.getElementById('titulo-pagina').textContent = '👤 Detalle de Asambleísta';
            document.getElementById('cedula').value = a.cedula;
            document.getElementById('cedula').disabled = true;
            document.getElementById('nombre').value = a.nombre;
            document.getElementById('correo').value = a.correo_institucional || '';

            cargarNombramientos(asambleistaId);
        } catch (err) {
            console.error('Error cargando asambleísta:', err);
        }
    }

    async function cargarNombramientos(id) {
        try {
            const res = await fetch(`/api/asambleistas/${id}/nombramientos`, {
                headers: { 'Authorization': 'Bearer ' + TOKEN }
            });
            const data = await res.json();
            const tbody = document.getElementById('tabla-nombramientos');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999">Sin nombramientos</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(n => `
                <tr>
                    <td>${n.sector || '—'}</td>
                    <td>${n.puesto || '—'}</td>
                    <td>${n.fecha_inicio || '—'}</td>
                    <td>${n.fecha_fin || 'Vigente'}</td>
                    <td><span class="badge ${n.estado?.toLowerCase() === 'activo' ? 'badge-activo' : 'badge-inactivo'}">${n.estado?.toUpperCase() || '—'}</span></td>
                </tr>
            `).join('');
        } catch (err) {
            console.error('Error cargando nombramientos:', err);
        }
    }

    async function guardarAsambleista() {
        const cedula = document.getElementById('cedula').value.trim();
        const nombre = document.getElementById('nombre').value.trim();
        const correo = document.getElementById('correo').value.trim();

        if (!cedula || !nombre) return mostrarNotif('notif-datos', 'Cédula y nombre son obligatorios', true);

        try {
            const res = await fetch('/api/asambleistas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
                body: JSON.stringify({ cedula, nombre, correo_institucional: correo })
            });
            const data = await res.json();
            if (!res.ok) return mostrarNotif('notif-datos', data.error || 'Error al guardar', true);

            asambleistaId = data.asambleista_id || data.id;
            mostrarNotif('notif-datos', '✅ Asambleísta guardado correctamente');
            document.getElementById('cedula').disabled = true;
        } catch (err) {
            mostrarNotif('notif-datos', 'Error al guardar', true);
        }
    }

    async function agregarNombramiento() {
        if (!asambleistaId) return mostrarNotif('notif-nom', 'Primero guarde el asambleísta', true);

        const sector_id = document.getElementById('selectSector').value;
        const fecha_inicio = document.getElementById('fechaInicio').value;

        if (!sector_id || !fecha_inicio) return mostrarNotif('notif-nom', 'Complete todos los campos', true);

        try {
            const res = await fetch('/api/nombramientos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
                body: JSON.stringify({ asambleista_id: asambleistaId, sector_id, fecha_inicio, estado: 'activo' })
            });
            const data = await res.json();
            if (!res.ok) return mostrarNotif('notif-nom', data.error || 'Error al agregar', true);

            mostrarNotif('notif-nom', '✅ Nombramiento agregado');
            cargarNombramientos(asambleistaId);
        } catch (err) {
            mostrarNotif('notif-nom', 'Error al agregar nombramiento', true);
        }
    }

    function mostrarNotif(id, msg, esError = false) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.className = 'notif ' + (esError ? 'notif-err' : 'notif-ok');
        setTimeout(() => el.className = 'notif', 4000);
    }

    cargarSectores();
    if (cedulaParam) cargarAsambleista(cedulaParam);
</script>
</body>
</html>
