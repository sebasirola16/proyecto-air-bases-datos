<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Asambleístas - AIR</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        .navbar { background: #1a3a5c; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
        .navbar strong { font-size: 16px; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .navbar a:hover { text-decoration: underline; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        h1 { color: #1a3a5c; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        input[type="text"] { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 280px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-primary { background: #1a3a5c; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th { background: #1a3a5c; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-vigente { background: #d4edda; color: #155724; }
        .badge-inactivo { background: #f8d7da; color: #721c24; }
        .sin-datos { text-align: center; color: #999; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

<div class="navbar">
    <strong>🏛️ Sistema AIR</strong>
    <a href="/shared/login.view.html">Inicio</a>
    <a href="/normativa/reglamento-arbol.view.html">Normativa</a>
    <a href="/sesiones/sesion-control-quorum.view.html">Sesiones</a>
    <a href="/certificaciones/atestados-solicitud.view.html">Certificaciones</a>
</div>

<div class="container">
    <h1>👥 Gestión de Asambleístas</h1>

    <div class="top-bar">
        <input type="text" id="buscador" placeholder="Buscar por nombre o cédula..." oninput="filtrar()" />
        <button class="btn-success" onclick="window.location.href='/asambleistas/asambleista-registro.view.html'">+ Nuevo Asambleísta</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Cédula</th>
                <th>Nombre</th>
                <th>Sector</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-body">
            <tr><td colspan="5" class="sin-datos">Cargando...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const TOKEN = localStorage.getItem('token') || '';
    let todos = [];

    async function cargarAsambleistas() {
        try {
            const res = await fetch('/api/asambleistas', {
                headers: { 'Authorization': 'Bearer ' + TOKEN }
            });
            const data = await res.json();
            todos = data;
            renderTabla(todos);
        } catch (err) {
            document.getElementById('tabla-body').innerHTML = '<tr><td colspan="5" class="sin-datos">Error al cargar datos</td></tr>';
        }
    }

    function renderTabla(data) {
        const tbody = document.getElementById('tabla-body');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="sin-datos">No hay asambleístas registrados</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(a => `
            <tr>
                <td>${a.cedula}</td>
                <td>${a.nombre}</td>
                <td>${a.sector || '—'}</td>
                <td><span class="badge ${a.estado_nombramiento?.toLowerCase() === 'activo' ? 'badge-vigente' : 'badge-inactivo'}">${a.estado_nombramiento?.toUpperCase() || 'SIN NOMBRAMIENTO'}</span></td>
                <td><button class="btn-info" onclick="ver('${a.cedula}')">Ver</button></td>
            </tr>
        `).join('');
    }

    function filtrar() {
        const texto = document.getElementById('buscador').value.toLowerCase();
        const filtrados = todos.filter(a =>
            a.nombre.toLowerCase().includes(texto) ||
            a.cedula.toLowerCase().includes(texto)
        );
        renderTabla(filtrados);
    }

    function ver(cedula) {
        window.location.href = `/asambleistas/asambleista-registro.view.html?cedula=${cedula}`;
    }

    cargarAsambleistas();
</script>
</body>
</html>
