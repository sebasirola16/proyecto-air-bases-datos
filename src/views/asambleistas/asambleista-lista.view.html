<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Asambleístas - AIR</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #1a3a5c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #1a3a5c; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .badge-vigente { background: green; color: white; padding: 3px 8px; border-radius: 4px; }
        .badge-inactivo { background: red; color: white; padding: 3px 8px; border-radius: 4px; }
        .btn { padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; }
        .btn-ver { background: #1a3a5c; color: white; }
        .btn-nuevo { background: green; color: white; padding: 10px 20px; margin-bottom: 20px; }
        input[type="text"] { padding: 8px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-left: 10px; }
    </style>
</head>
<body>

    <h1>AIR - Gestión de Asambleístas</h1>

    <input type="text" id="buscador" placeholder="Buscar por nombre o cédula..." onkeyup="filtrar()">
    <select id="filtroSector" onchange="filtrar()">
        <option value="">Todos los sectores</option>
    </select>
    <button class="btn btn-nuevo" onclick="window.location.href='asambleista-registro.view.html'">
        + Nuevo Asambleísta
    </button>

    <table id="tabla">
        <thead>
            <tr>
                <th>Cédula</th>
                <th>Nombre</th>
                <th>Sector</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpo">
            <!-- Se llena dinámicamente -->
        </tbody>
    </table>

    <script>
        async function cargarAsambleistas() {
            const res = await fetch('/api/asambleistas');
            const datos = await res.json();
            const cuerpo = document.getElementById('cuerpo');
            cuerpo.innerHTML = '';
            datos.forEach(a => {
                const estado = a.activo
                    ? '<span class="badge-vigente">VIGENTE</span>'
                    : '<span class="badge-inactivo">INACTIVO</span>';
                cuerpo.innerHTML += `
                    <tr>
                        <td>${a.cedula}</td>
                        <td>${a.nombre}</td>
                        <td>${a.sector || 'Sin sector'}</td>
                        <td>${estado}</td>
                        <td><button class="btn btn-ver" onclick="ver('${a.cedula}')">Ver</button></td>
                    </tr>
                `;
            });
        }

        async function cargarSectoresFiltro() {
            const res = await fetch('/api/sectores');
            const datos = await res.json();
            const select = document.getElementById('filtroSector');
            datos.forEach(s => {
                select.innerHTML += `<option value="${s.nombre.toLowerCase()}">${s.nombre}</option>`;
            });
        }

        function filtrar() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const sector = document.getElementById('filtroSector').value.toLowerCase();
            const filas = document.querySelectorAll('#cuerpo tr');
            filas.forEach(fila => {
                const coincideTexto = fila.innerText.toLowerCase().includes(texto);
                const coincideSector = sector === '' || fila.innerText.toLowerCase().includes(sector);
                fila.style.display = coincideTexto && coincideSector ? '' : 'none';
            });
        }

        function ver(cedula) {
            window.location.href = `asambleista-registro.view.html?cedula=${cedula}`;
        }

        cargarAsambleistas();
        cargarSectoresFiltro();
    </script>

</body>
</html>
