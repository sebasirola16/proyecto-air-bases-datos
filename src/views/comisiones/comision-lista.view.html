<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comisiones - Sistema AIR</title>
</head>
<body>
    <h1>Gestión de Comisiones</h1>

    <section id="buscador-comisiones">
        <input 
            type="text" 
            id="input-buscar-comision" 
            placeholder="Buscar comisión por nombre..."
        />
        <button id="btn-buscar">Buscar</button>
    </section>

    <section id="tabla-comisiones">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Integrantes</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="resultado-comisiones">
                <!-- Se llena dinámicamente en Sprint 3 -->
            </tbody>
        </table>
    </section>
</body>
</html>
