<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitud de Atestados - Sistema AIR</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        .navbar { background: #1a3a5c; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
        .navbar strong { font-size: 16px; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .navbar a:hover { text-decoration: underline; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        h1 { color: #1a3a5c; }
        .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; border: 1px solid #ddd; }
        input { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; margin-top: 4px; }
        label { font-weight: bold; color: #1a3a5c; display: block; margin-top: 12px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; margin-top: 16px; margin-right: 8px; }
        .btn-primary { background: #1a3a5c; color: white; }
        .btn-pdf { background: #dc3545; color: white; }
        .notif { padding: 10px 16px; border-radius: 6px; margin: 10px 0; display: none; font-weight: bold; }
        .notif-ok { background: #d4edda; color: #155724; display: block; }
        .notif-err { background: #f8d7da; color: #721c24; display: block; }
        .dato-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .dato-label { font-weight: bold; color: #555; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th { background: #1a3a5c; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-vigente { background: #d4edda; color: #155724; }
        .badge-historica { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="navbar">
    <strong>🏛️ Sistema AIR</strong>
    <a href="/shared/login.view.html">Inicio</a>
    <a href="/asambleistas/asambleista-lista.view.html">Asambleístas</a>
    <a href="/normativa/reglamento-arbol.view.html">Normativa</a>
    <a href="/certificaciones/certificado-final.view.html">Certificados</a>
</div>

<div class="container">
    <h1>📄 Solicitud de Atestados</h1>

    <div class="card">
        <h2>Buscar Asambleísta</h2>
        <label for="inputCedula">Cédula del asambleísta</label>
        <input type="text" id="inputCedula" placeholder="Ej: 101110111" />
        <button class="btn-primary" onclick="buscarAtestados()">Buscar</button>
        <div id="notif" class="notif"></div>
    </div>

    <div id="seccion-resultado" style="display:none">
        <div class="card">
            <h2>Datos del Asambleísta</h2>
            <div id="datos-asambleista"></div>
        </div>

        <div class="card">
            <h2>Historial de Nombramientos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Sector</th>
                        <th>Puesto</th>
                        <th>Fecha Inicio</th>
                        <th>Fecha Fin</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-nombramientos"></tbody>
            </table>
            <button class="btn-pdf" onclick="window.print()">📥 Imprimir Atestado</button>
            <button class="btn-primary" onclick="window.location.href='/certificaciones/certificado-final.view.html'">🏅 Generar Certificado</button>
        </div>
    </div>
</div>

<script>
    const TOKEN = localStorage.getItem('token') || '';
    let asambleistaActual = null;

    async function buscarAtestados() {
        const cedula = document.getElementById('inputCedula').value.trim();
        if (!cedula) return mostrarNotif('Ingrese una cédula', true);

        try {
            const res = await fetch(`/api/asambleistas/${cedula}`, {
                headers: { 'Authorization': 'Bearer ' + TOKEN }
            });
            const data = await res.json();
            if (!res.ok || !data) return mostrarNotif('Asambleísta no encontrado', true);

            asambleistaActual = Array.isArray(data) ? data[0] : data;
            mostrarDatos(asambleistaActual);

            const resNom = await fetch(`/api/asambleistas/${asambleistaActual.asambleista_id}/nombramientos`, {
                headers: { 'Authorization': 'Bearer ' + TOKEN }
            });
            const nombramientos = await resNom.json();
            mostrarNombramientos(nombramientos);

            document.getElementById('seccion-resultado').style.display = 'block';
            mostrarNotif('✅ Atestados cargados correctamente');
        } catch (err) {
            mostrarNotif('Error al buscar atestados', true);
        }
    }

    function mostrarDatos(data) {
        document.getElementById('datos-asambleista').innerHTML = `
            <div class="dato-row"><span class="dato-label">Cédula:</span><span>${data.cedula}</span></div>
            <div class="dato-row"><span class="dato-label">Nombre:</span><span>${data.nombre}</span></div>
            <div class="dato-row"><span class="dato-label">Correo:</span><span>${data.correo_institucional || '—'}</span></div>
        `;
    }

    function mostrarNombramientos(data) {
        const tbody = document.getElementById('tabla-nombramientos');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999">Sin nombramientos registrados</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(n => {
            const esActivo = n.estado?.toLowerCase() === 'activo';
            return `<tr>
                <td>${n.sector || '—'}</td>
                <td>${n.puesto || '—'}</td>
                <td>${n.fecha_inicio || '—'}</td>
                <td>${n.fecha_fin || 'Vigente'}</td>
                <td><span class="badge ${esActivo ? 'badge-vigente' : 'badge-historica'}">${n.estado?.toUpperCase() || '—'}</span></td>
            </tr>`;
        }).join('');
    }

    function mostrarNotif(msg, esError = false) {
        const el = document.getElementById('notif');
        el.textContent = msg;
        el.className = 'notif ' + (esError ? 'notif-err' : 'notif-ok');
        setTimeout(() => el.className = 'notif', 4000);
    }
</script>
</body>
</html>
