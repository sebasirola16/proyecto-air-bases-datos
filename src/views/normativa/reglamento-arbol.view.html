<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Árbol Normativo - Sistema AIR</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        .navbar { background: #1a3a5c; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
        .navbar strong { font-size: 16px; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .navbar a:hover { text-decoration: underline; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        h1 { color: #1a3a5c; }
        select, button { padding: 8px 12px; margin: 5px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #1a3a5c; color: white; cursor: pointer; border: none; }
        button:hover { background: #2a5a8c; }
        .arbol { margin-top: 20px; }
        .nodo { list-style: none; margin: 4px 0; padding: 0; }
        .nodo-header {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; background: white;
            border: 1px solid #ddd; border-radius: 6px;
            cursor: pointer; transition: background 0.2s;
        }
        .nodo-header:hover { background: #eaf0fb; }
        .toggle { font-size: 12px; color: #888; width: 16px; }
        .nivel { font-weight: bold; color: #1a3a5c; font-size: 12px; }
        .etiqueta { font-weight: bold; }
        .texto { color: #555; font-size: 13px; flex: 1; }
        .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-vigente { background: #d4edda; color: #155724; }
        .badge-historica { background: #f8d7da; color: #721c24; }
        .badge-otro { background: #fff3cd; color: #856404; }
        .hijos { padding-left: 24px; margin: 0; display: none; }
        .hijos.abierto { display: block; }
        .sin-datos { color: #999; font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>

<div class="navbar">
    <strong>🏛️ Sistema AIR</strong>
    <a href="/shared/login.view.html">Inicio</a>
    <a href="/asambleistas/asambleista-lista.view.html">Asambleístas</a>
    <a href="/sesiones/sesion-control-quorum.view.html">Sesiones</a>
    <a href="/certificaciones/atestados-solicitud.view.html">Certificaciones</a>
</div>

<div class="container">
    <h1>📋 Árbol Normativo</h1>

    <div>
        <label for="selectReglamento"><strong>Reglamento:</strong></label>
        <select id="selectReglamento">
            <option value="">-- Seleccione --</option>
        </select>
        <button onclick="cargarArbol()">Ver árbol</button>
        <button onclick="window.location.href='/normativa/reglamento-editor.view.html'" style="background:#28a745">+ Nuevo elemento</button>
    </div>

    <div id="contenedor-arbol" class="arbol"></div>
</div>

<script>
    const TOKEN = localStorage.getItem('token') || '';

    async function cargarReglamentos() {
        try {
            const res = await fetch('/api/reglamentos', {
                headers: { 'Authorization': 'Bearer ' + TOKEN }
            });
            const data = await res.json();
            const select = document.getElementById('selectReglamento');
            data.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.id_reglamento;
                opt.textContent = `${r.sigla} - ${r.nombre_normativa}`;
                select.appendChild(opt);
            });
        } catch (err) {
            console.error('Error cargando reglamentos:', err);
        }
    }

    async function cargarArbol() {
        const id = document.getElementById('selectReglamento').value;
        if (!id) return alert('Seleccione un reglamento');

        try {
            const res = await fetch(`/api/reglamentos/${id}/arbol`, {
                headers: { 'Authorization': 'Bearer ' + TOKEN }
            });
            const nodos = await res.json();
            renderArbol(nodos);
        } catch (err) {
            console.error('Error cargando árbol:', err);
        }
    }

    function renderArbol(nodos) {
        const contenedor = document.getElementById('contenedor-arbol');
        contenedor.innerHTML = '';

        if (!nodos || nodos.length === 0) {
            contenedor.innerHTML = '<p class="sin-datos">No hay elementos para este reglamento.</p>';
            return;
        }

        const mapa = {};
        nodos.forEach(n => mapa[n.id_elemento] = { ...n, hijos: [] });

        const raices = [];
        nodos.forEach(n => {
            if (n.id_elemento_padre && mapa[n.id_elemento_padre]) {
                mapa[n.id_elemento_padre].hijos.push(mapa[n.id_elemento]);
            } else {
                raices.push(mapa[n.id_elemento]);
            }
        });

        const ul = document.createElement('ul');
        ul.style.paddingLeft = '0';
        raices.forEach(r => ul.appendChild(crearNodo(r)));
        contenedor.appendChild(ul);
    }

    function crearNodo(nodo) {
        const li = document.createElement('li');
        li.className = 'nodo';

        let badgeClass = 'badge-otro';
        const estado = (nodo.estado_vigencia || '').toLowerCase();
        if (estado.includes('vigente')) badgeClass = 'badge-vigente';
        else if (estado.includes('hist')) badgeClass = 'badge-historica';

        const tieneHijos = nodo.hijos && nodo.hijos.length > 0;

        li.innerHTML = `
            <div class="nodo-header" onclick="toggleHijos(this)">
                <span class="toggle">${tieneHijos ? '▶' : '•'}</span>
                <span class="nivel">${nodo.nivel}</span>
                <span class="etiqueta">${nodo.numero_etiqueta || ''}</span>
                <span class="texto">${nodo.contenido_texto}</span>
                <span class="badge ${badgeClass}">${nodo.estado_vigencia}</span>
            </div>
        `;

        if (tieneHijos) {
            const ul = document.createElement('ul');
            ul.className = 'hijos';
            nodo.hijos.forEach(h => ul.appendChild(crearNodo(h)));
            li.appendChild(ul);
        }

        return li;
    }

    function toggleHijos(header) {
        const hijos = header.parentElement.querySelector('.hijos');
        const toggle = header.querySelector('.toggle');
        if (!hijos) return;
        hijos.classList.toggle('abierto');
        toggle.textContent = hijos.classList.contains('abierto') ? '▼' : '▶';
    }

    cargarReglamentos();
</script>

</body>
</html>
