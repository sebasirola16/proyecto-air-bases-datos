<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - AIR</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #1a3a5c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #1a3a5c; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .btn { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; margin-right: 5px; }
        .btn-nuevo { background: green; color: white; padding: 10px 20px; margin-bottom: 20px; }
        .btn-guardar { background: #1a3a5c; color: white; }
        .btn-cancelar { background: gray; color: white; }
        .form-grupo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { padding: 8px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        .mensaje { padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; }
        .exito { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                 background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 30px; border-radius: 8px; width: 400px; }
        .modal-box h2 { color: #1a3a5c; margin-bottom: 20px; }
        .badge-admin { background: #1a3a5c; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .badge-secretaria { background: green; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .badge-asambleista { background: gray; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>Panel de Administración - Usuarios</h1>

    <div id="mensaje" class="mensaje"></div>

    <button class="btn btn-nuevo" onclick="abrirModal()">+ Nuevo Usuario</button>

    <table>
        <thead>
            <tr>
                <th>Usuario</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="cuerpo">
            <!-- Se llena dinámicamente -->
        </tbody>
    </table>

    <!-- Modal nuevo usuario -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <h2>Nuevo Usuario</h2>
            <div class="form-grupo">
                <label>Usuario *</label>
                <input type="text" id="username" placeholder="Nombre de usuario">
            </div>
            <div class="form-grupo">
                <label>Email</label>
                <input type="email" id="email" placeholder="correo@itcr.ac.cr">
            </div>
            <div class="form-grupo">
                <label>Contraseña *</label>
                <input type="password" id="password" placeholder="Contraseña">
            </div>
            <div class="form-grupo">
                <label>Rol *</label>
                <select id="rol">
                    <option value="">Seleccione un rol</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Secretaría AIR">Secretaría AIR</option>
                    <option value="Asambleísta">Asambleísta</option>
                </select>
            </div>
            <button class="btn btn-guardar" onclick="crearUsuario()">Guardar</button>
            <button class="btn btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <script>
        async function cargarUsuarios() {
            try {
                const res = await fetch('/api/admin/usuarios');
                const datos = await res.json();
                const cuerpo = document.getElementById('cuerpo');
                cuerpo.innerHTML = '';
                datos.forEach(u => {
                    const rolBadge = u.rol === 'Administrador'
                        ? `<span class="badge-admin">${u.rol}</span>`
                        : u.rol === 'Secretaría AIR'
                        ? `<span class="badge-secretaria">${u.rol}</span>`
                        : `<span class="badge-asambleista">${u.rol}</span>`;
                    cuerpo.innerHTML += `
                        <tr>
                            <td>${u.username}</td>
                            <td>${u.email || '-'}</td>
                            <td>${rolBadge}</td>
                            <td>${u.activo ? 'Activo' : 'Inactivo'}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                mostrarMensaje('Error al cargar usuarios', false);
            }
        }

        async function crearUsuario() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rol = document.getElementById('rol').value;

            if (!username || !password || !rol) {
                mostrarMensaje('Usuario, contraseña y rol son obligatorios', false);
                return;
            }

            try {
                const res = await fetch('/api/admin/usuarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, rol })
                });

                const datos = await res.json();
                if (!res.ok) {
                    mostrarMensaje(datos.error || 'Error al crear usuario', false);
                } else {
                    mostrarMensaje(datos.mensaje, true);
                    cerrarModal();
                    cargarUsuarios();
                }
            } catch (err) {
                mostrarMensaje('Error de conexión', false);
            }
        }

        function abrirModal() {
            document.getElementById('modal').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('rol').value = '';
        }

        function mostrarMensaje(texto, exito) {
            const div = document.getElementById('mensaje');
            div.style.display = 'block';
            div.className = `mensaje ${exito ? 'exito' : 'error'}`;
            div.innerText = texto;
            if (exito) setTimeout(() => { div.style.display = 'none'; }, 5000);
        }

        cargarUsuarios();
    </script>

</body>
</html>
